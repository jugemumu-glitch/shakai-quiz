<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社会チャレンジ！ 5年生</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --sky: #0ea5e9;
    --sun: #fbbf24;
    --earth: #16a34a;
    --red: #ef4444;
    --deep: #0c1a2e;
    --card: #f0f9ff;
    --accent: #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(160deg, #0c1a2e 0%, #1e3a5f 60%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 10%, rgba(255,255,255,.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  /* ========== HEADER ========== */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    color: #fff;
    text-shadow: 0 0 20px rgba(14,165,233,.8), 0 2px 4px rgba(0,0,0,.5);
    letter-spacing: .05em;
  }
  .header .sub {
    font-size: .85rem;
    color: #7dd3fc;
    margin-top: 4px;
    letter-spacing: .1em;
  }

  /* ========== STATUS BAR ========== */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 50px;
    padding: 10px 18px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #e0f2fe;
    font-size: .85rem;
    font-weight: 700;
  }
  .stat-icon { font-size: 1.1rem; }
  .stat-val { color: #fbbf24; font-size: 1rem; }
  .divider { width: 1px; height: 20px; background: rgba(255,255,255,.2); }
  .progress-wrap { flex: 1; }
  .progress-bar-bg {
    height: 8px;
    background: rgba(255,255,255,.15);
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sky), var(--sun));
    border-radius: 50px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ========== CARD ========== */
  .card {
    background: rgba(240,249,255,.96);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.2);
    animation: cardIn .35s cubic-bezier(.4,0,.2,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .q-badge {
    background: var(--sky);
    color: #fff;
    font-size: .72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 50px;
    letter-spacing: .08em;
  }
  .q-badge.text-type { background: var(--accent); }
  .q-num {
    font-size: .82rem;
    color: #64748b;
    margin-left: auto;
    font-weight: 700;
  }

  .question-text {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    color: #0c1a2e;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  /* 4択 */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background: #fff;
    color: #1e293b;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--sky);
    background: #e0f2fe;
    transform: translateX(4px);
  }
  .choice-btn.correct {
    border-color: var(--earth);
    background: #dcfce7;
    color: var(--earth);
  }
  .choice-btn.wrong {
    border-color: var(--red);
    background: #fee2e2;
    color: var(--red);
  }
  .choice-btn:disabled { cursor: default; }
  .choice-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #e2e8f0;
    font-size: .78rem;
    font-weight: 900;
    flex-shrink: 0;
    transition: background .18s;
  }
  .choice-btn.correct .choice-label { background: var(--earth); color: #fff; }
  .choice-btn.wrong .choice-label   { background: var(--red); color: #fff; }

  /* 記述式 */
  .text-input-wrap { display: flex; flex-direction: column; gap: 10px; }
  .text-input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #0c1a2e;
    outline: none;
    transition: border-color .18s;
  }
  .text-input:focus { border-color: var(--sky); }
  .text-input.correct { border-color: var(--earth); background: #dcfce7; }
  .text-input.wrong   { border-color: var(--red); background: #fee2e2; }
  .submit-btn {
    padding: 13px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--sky), #0284c7);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 14px rgba(14,165,233,.4);
  }
  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(14,165,233,.5);
  }
  .submit-btn:disabled { background: #94a3b8; box-shadow: none; cursor: default; }

  /* フィードバック */
  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: .9rem;
    font-weight: 700;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; animation: fadeIn .25s; }
  .feedback.correct-fb { background: #dcfce7; color: #166534; border-left: 4px solid var(--earth); }
  .feedback.wrong-fb   { background: #fee2e2; color: #991b1b; border-left: 4px solid var(--red); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ヒントボタン */
  .hint-btn {
    margin-top: 12px;
    width: 100%;
    padding: 11px;
    border: 2px dashed #a5b4fc;
    border-radius: 14px;
    background: transparent;
    color: #6366f1;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .18s;
    display: none;
  }
  .hint-btn.show { display: block; animation: fadeIn .25s; }
  .hint-btn:hover:not(:disabled) {
    background: #eef2ff;
    border-color: #6366f1;
  }
  .hint-btn:disabled {
    opacity: .5;
    cursor: default;
  }

  .hint-area {
    margin-top: 10px;
    padding: 11px 15px;
    border-radius: 12px;
    background: #fefce8;
    border-left: 4px solid #eab308;
    color: #854d0e;
    font-size: .88rem;
    font-weight: 700;
    line-height: 1.6;
    display: none;
  }
  .hint-area.show { display: block; animation: fadeIn .25s; }

  .next-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--sun), var(--accent));
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: .05em;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px rgba(251,191,36,.4);
    display: none;
  }
  .next-btn.show { display: block; animation: fadeIn .3s .1s both; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(251,191,36,.5); }

  /* ========== RESULT ========== */
  .result-screen {
    display: none;
    text-align: center;
    padding: 10px 0;
  }
  .result-screen.show { display: block; animation: cardIn .4s; }

  .result-trophy { font-size: 4rem; margin-bottom: 10px; }
  .result-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem;
    color: #0c1a2e;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 1rem;
    color: #475569;
    margin-bottom: 20px;
  }
  .result-score strong { color: var(--earth); font-size: 1.4rem; }

  .point-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--sun), var(--accent));
    color: #fff;
    font-size: 1.5rem;
    font-weight: 900;
    padding: 14px 36px;
    border-radius: 50px;
    box-shadow: 0 6px 24px rgba(251,191,36,.5);
    margin-bottom: 24px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  .point-note {
    font-size: .85rem;
    color: #64748b;
    margin-bottom: 24px;
  }

  .restart-btn {
    padding: 14px 40px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--sky), #0284c7);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(14,165,233,.4);
    transition: transform .15s;
  }
  .restart-btn:hover { transform: translateY(-2px); }

  /* ========== START SCREEN ========== */
  .start-screen {
    text-align: center;
    padding: 10px 0;
  }
  .start-screen .hero-icon { font-size: 4rem; margin-bottom: 12px; }
  .start-screen h2 {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.5rem;
    color: #0c1a2e;
    margin-bottom: 10px;
  }
  .start-screen p {
    font-size: .9rem;
    color: #475569;
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .rule-list {
    text-align: left;
    background: #f8fafc;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }
  .rule-list li {
    font-size: .88rem;
    color: #334155;
    line-height: 2;
    list-style: none;
    padding-left: 4px;
  }
  .start-btn {
    padding: 15px 50px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--sun), var(--accent));
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(251,191,36,.5);
    letter-spacing: .08em;
    transition: transform .15s;
  }
  .start-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🗾 社会チャレンジ！</h1>
    <div class="sub">小学5年生 · 日本の地理・産業・歴史</div>
  </div>

  <!-- スタート画面 -->
  <div class="card" id="startScreen">
    <div class="start-screen">
      <div class="hero-icon">📚</div>
      <h2>ルール説明</h2>
      <ul class="rule-list">
        <li>🎯 全部で <strong>30問</strong> 出題されます</li>
        <li>✅ 全問正解すると <strong>50ポイント</strong> もらえます</li>
        <li>❌ 不正解でも次の問題に進めます</li>
        <li>💡 わからないときは「ヒント」が使えます</li>
      </ul>
      <button class="start-btn" onclick="startQuiz()">スタート！</button>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="quizArea" style="display:none;">
    <div class="status-bar">
      <div class="stat-item">
        <span class="stat-icon">✅</span>
        <span>正解</span>
        <span class="stat-val" id="correctCount">0</span>
      </div>
      <div class="divider"></div>
      <div class="stat-item">
        <span class="stat-icon">⭐</span>
        <span>PT</span>
        <span class="stat-val" id="pointCount">0</span>
      </div>
      <div class="divider"></div>
      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="qProgress">0/30</span>
      </div>
    </div>

    <div class="card" id="quizCard">
      <div class="q-meta">
        <span class="q-badge" id="qTypeBadge">4択</span>
        <span class="q-num" id="qNumLabel">第 1 問</span>
      </div>
      <div class="question-text" id="questionText"></div>

      <!-- 4択 -->
      <div class="choices" id="choicesArea"></div>

      <!-- 記述 -->
      <div class="text-input-wrap" id="textInputArea" style="display:none;">
        <input class="text-input" id="textInput" type="text" placeholder="答えを入力してください" autocomplete="off">
        <button class="submit-btn" id="submitBtn" onclick="submitText()">答える</button>
      </div>

      <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 ヒントを見る</button>
      <div class="hint-area" id="hintArea"></div>
      <div class="feedback" id="feedbackArea"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="card" id="resultScreen" style="display:none;">
    <div class="result-screen show">
      <div class="result-trophy" id="resultTrophy">🏆</div>
      <div class="result-title" id="resultTitle">おめでとう！</div>
      <div class="result-score" id="resultScore"></div>
      <div class="point-badge" id="pointBadge">＋50 ポイント！</div>
      <div class="point-note" id="pointNote"></div>
      <button class="restart-btn" onclick="restartQuiz()">もう一度チャレンジ！</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ===== 4択 =====
  { type:'choice', q:'日本で一番長い川はどれですか？', choices:['信濃川','利根川','木曽川','石狩川'], ans:0, hint:'長野・新潟を流れ、全長367kmです。' },
  { type:'choice', q:'日本の農業で、稲作がもっとも多く行われている地方はどこですか？', choices:['関東地方','東北地方','中部地方','九州地方'], ans:1, hint:'「米どころ」として有名な秋田・山形・宮城があります。' },
  { type:'choice', q:'日本の食料自給率（カロリーベース）はおおよそ何%ですか？', choices:['約90%','約70%','約38%','約10%'], ans:2, hint:'先進国の中でも低い水準で、問題となっています。' },
  { type:'choice', q:'北海道の農業でもっとも有名な農産物は何ですか？', choices:['みかん','じゃがいも・乳製品','りんご','茶'], ans:1, hint:'広大な土地を活かした畑作・酪農が盛んです。' },
  { type:'choice', q:'日本の工業で「中京工業地帯」がある都市はどこですか？', choices:['大阪','名古屋','広島','福岡'], ans:1, hint:'自動車工業が中心で、日本最大の工業地帯です。' },
  { type:'choice', q:'日本の周りを流れる暖かい海流で、黒潮とも呼ばれるのはどれですか？', choices:['親潮（千島海流）','日本海流（黒潮）','リマン海流','対馬海流'], ans:1, hint:'太平洋側を北上し、魚が豊富です。' },
  { type:'choice', q:'日本の国土面積はおよそ何万km²ですか？', choices:['約18万km²','約38万km²','約58万km²','約78万km²'], ans:1, hint:'北方領土を含めるとこの面積になります。' },
  { type:'choice', q:'沖縄でよく見られる、強い台風に備えた伝統的な石垣の家の屋根のまわりの低い壁を何といいますか？', choices:['石塀','雨戸','雪止め','風よけ壁'], ans:0, hint:'サンゴ礁の石で作られ、家を守ります。' },
  { type:'choice', q:'日本の漁業で「遠洋漁業」が行われる場所はどこですか？', choices:['海岸近く','川や湖','世界中の遠い海','港のすぐそば'], ans:2, hint:'燃料費が高く、近年は減少しています。' },
  { type:'choice', q:'日本の伝統的な工芸品「西陣織」はどこで作られますか？', choices:['東京','大阪','京都','名古屋'], ans:2, hint:'室町時代から続く高級絹織物です。' },
  { type:'choice', q:'温暖な気候を利用して野菜や果物の出荷時期を早める栽培方法を何といいますか？', choices:['抑制栽培','促成栽培','水耕栽培','有機栽培'], ans:1, hint:'高知・宮崎などで多く行われています。' },
  { type:'choice', q:'環太平洋造山帯に属し、日本が地震や火山が多い理由として正しいのはどれですか？', choices:['大陸の中心にある','海溝付近でプレートがぶつかるから','赤道に近いから','海がない内陸国だから'], ans:1, hint:'4つのプレートが日本の周りで動いています。' },
  { type:'choice', q:'日本の三大工業地帯のうち、大阪を中心としたものを何といいますか？', choices:['阪神工業地帯','京浜工業地帯','中京工業地帯','北九州工業地帯'], ans:0, hint:'化学・金属工業が中心です。' },
  { type:'choice', q:'日本の米の生産量が全国1位の都道府県はどこですか？', choices:['新潟県','秋田県','北海道','山形県'], ans:0, hint:'「コシヒカリ」の産地として有名です。' },
  { type:'choice', q:'山地や山脈が連なる「日本アルプス」のうち「南アルプス」は正式に何山脈ですか？', choices:['飛騨山脈','木曽山脈','赤石山脈','奥羽山脈'], ans:2, hint:'静岡・長野・山梨にまたがります。' },
  // ===== 記述 =====
  { type:'text', q:'日本の最高峰の山の名前を答えなさい。', ans:['富士山','ふじさん','フジサン'], hint:'標高3776m。静岡県と山梨県にあります。' },
  { type:'text', q:'日本の首都はどこですか？', ans:['東京','とうきょう','トウキョウ','東京都'], hint:'政治・経済・文化の中心地です。' },
  { type:'text', q:'日本の都道府県の数は全部でいくつですか？数字で答えなさい。', ans:['47'], hint:'1都・1道・2府・43県です。' },
  { type:'text', q:'日本最大の湖の名前を答えなさい。', ans:['琵琶湖','びわこ','ビワコ'], hint:'滋賀県にあり、面積約670km²です。' },
  { type:'text', q:'日本の農業で、同じ田畑で1年に2回作物をつくることを何といいますか？', ans:['二期作','にきさく'], hint:'温暖な地域で行われ、お米を2回育てることが多いです。' },
  { type:'text', q:'工場から出る煙や水が原因で起きる環境問題を何といいますか？漢字2文字で答えなさい。', ans:['公害'], hint:'1960〜70年代に日本各地で深刻になりました。' },
  { type:'text', q:'日本で一番人口が多い都市（都道府県）はどこですか？', ans:['東京','東京都','とうきょう'], hint:'約1400万人が住んでいます。' },
  { type:'text', q:'日本の川の特徴として、外国の川と比べて「短くて（　　）」という言葉を入れなさい。', ans:['急','急流','急な','けわしい','流れが急'], hint:'山地が多く、海まで距離が短いためです。' },
  { type:'text', q:'稲作農家が米を作る田んぼで水を引くための施設を何といいますか？漢字2文字で答えなさい。', ans:['水路','すいろ'], hint:'農業用水を運ぶための溝です。' },
  { type:'text', q:'日本の国土の約何分の2が森林ですか？数字と文字で「約○分の○」の形で答えなさい。', ans:['約3分の2','3分の2'], hint:'約67%が森林で、世界的にも高い水準です。' },
  { type:'text', q:'北海道や東北地方の夏に、太平洋側から吹いてくる冷たく湿った風を何といいますか？', ans:['やませ','ヤマセ'], hint:'農作物に被害を与えることがあります。' },
  { type:'text', q:'日本の太平洋側に多く降る雨は、主にどの季節ですか？', ans:['夏','なつ'], hint:'梅雨や台風の影響で多くなります。' },
  { type:'text', q:'日本で産業の中心が工業から情報・サービス業に変化することを何といいますか？漢字4文字で答えなさい。', ans:['産業の高度化','産業高度化','サービス化','高度化'], hint:'第三次産業の割合が増えています。' },
  { type:'text', q:'日本の米作りで、苗を田んぼに移すことを何といいますか？漢字2文字で答えなさい。', ans:['田植え','田植','たうえ'], hint:'6月ごろに行われる農作業です。' },
  { type:'text', q:'日本列島を背骨のように南北に走る山脈で「奥羽山脈」があるのは何地方ですか？', ans:['東北地方','東北','とうほく'], hint:'青森から栃木まで続く日本最長の山脈です。' },
];

let questions = [];
let current = 0;
let correct = 0;
let points = 0;
let answered = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - .5);
}

function startQuiz() {
  questions = shuffle(ALL_QUESTIONS).slice(0, 30);
  current = 0; correct = 0; points = 0; answered = false;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  updateStatus();
  loadQuestion();
}

function updateStatus() {
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('pointCount').textContent = points;
  document.getElementById('qProgress').textContent = current + '/30';
  document.getElementById('progressFill').style.width = (current / 30 * 100) + '%';
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qNumLabel').textContent = `第 ${current + 1} 問`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedbackArea').className = 'feedback';
  document.getElementById('feedbackArea').textContent = '';
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('hintBtn').className = 'hint-btn show';
  document.getElementById('hintBtn').disabled = false;
  document.getElementById('hintBtn').textContent = '💡 ヒントを見る';
  document.getElementById('hintArea').className = 'hint-area';
  document.getElementById('hintArea').textContent = '';

  const badge = document.getElementById('qTypeBadge');
  const choicesArea = document.getElementById('choicesArea');
  const textInputArea = document.getElementById('textInputArea');

  if (q.type === 'choice') {
    badge.textContent = '4択';
    badge.className = 'q-badge';
    choicesArea.style.display = 'flex';
    textInputArea.style.display = 'none';

    const labels = ['Ａ','Ｂ','Ｃ','Ｄ'];
    const idxs = shuffle([0,1,2,3]);
    choicesArea.innerHTML = '';
    idxs.forEach((origIdx, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-label">${labels[i]}</span>${q.choices[origIdx]}`;
      btn.onclick = () => selectChoice(origIdx, btn);
      choicesArea.appendChild(btn);
    });
  } else {
    badge.textContent = '記述';
    badge.className = 'q-badge text-type';
    choicesArea.style.display = 'none';
    textInputArea.style.display = 'flex';
    const inp = document.getElementById('textInput');
    inp.value = '';
    inp.className = 'text-input';
    inp.disabled = false;
    document.getElementById('submitBtn').disabled = false;
    inp.onkeydown = (e) => { if (e.key === 'Enter') submitText(); };
    setTimeout(() => inp.focus(), 100);
  }

  // card re-animate
  const card = document.getElementById('quizCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'cardIn .35s cubic-bezier(.4,0,.2,1)';
}

function selectChoice(origIdx, btn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  if (origIdx === q.ans) {
    btn.classList.add('correct');
    correct++;
    points += Math.round(50 / 30 * 10) / 10;
    showFeedback(true, '正解！ ' + q.hint);
  } else {
    btn.classList.add('wrong');
    // highlight correct
    const choicesHTML = document.querySelectorAll('.choice-btn');
    choicesHTML.forEach(b => {
      if (b.textContent.includes(q.choices[q.ans])) b.classList.add('correct');
    });
    showFeedback(false, `不正解。正しい答えは「${q.choices[q.ans]}」です。${q.hint}`);
  }
  updateStatus();
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('nextBtn').className = 'next-btn show';
}

function submitText() {
  if (answered) return;
  const q = questions[current];
  const inp = document.getElementById('textInput');
  const val = inp.value.trim();
  if (!val) return;
  answered = true;
  inp.disabled = true;
  document.getElementById('submitBtn').disabled = true;

  const norm = val.replace(/\s/g,'').toLowerCase();
  const isCorrect = q.ans.some(a => a.replace(/\s/g,'').toLowerCase() === norm);

  if (isCorrect) {
    inp.classList.add('correct');
    correct++;
    points += Math.round(50 / 30 * 10) / 10;
    showFeedback(true, '正解！ ' + q.hint);
  } else {
    inp.classList.add('wrong');
    showFeedback(false, `不正解。正しい答えは「${q.ans[0]}」です。${q.hint}`);
  }
  updateStatus();
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('nextBtn').className = 'next-btn show';
}

function showHint() {
  if (answered) return;
  const q = questions[current];
  const hintArea = document.getElementById('hintArea');
  const hintBtn = document.getElementById('hintBtn');
  hintArea.textContent = '💡 ' + q.hint;
  hintArea.className = 'hint-area show';
  hintBtn.textContent = '💡 ヒントを見た';
  hintBtn.disabled = true;
}

function showFeedback(isCorrect, msg) {
  const fb = document.getElementById('feedbackArea');
  fb.textContent = (isCorrect ? '⭕ ' : '❌ ') + msg;
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
}

function nextQuestion() {
  current++;
  if (current >= 30) {
    showResult();
  } else {
    updateStatus();
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';

  const perfect = correct === 30;
  document.getElementById('resultTrophy').textContent = perfect ? '🏆' : correct >= 20 ? '🌟' : '📖';
  document.getElementById('resultTitle').textContent = perfect ? 'パーフェクト！！' : correct >= 20 ? 'よくできました！' : 'もう一度挑戦しよう！';
  document.getElementById('resultScore').innerHTML = `30問中 <strong>${correct}問</strong> 正解`;

  const finalPoints = perfect ? 50 : Math.floor(correct / 30 * 50);
  document.getElementById('pointBadge').textContent = `＋${finalPoints} ポイント！`;
  document.getElementById('pointNote').textContent = perfect
    ? '全問正解で満点ボーナス50ポイント獲得！'
    : `正解数に応じて ${finalPoints} ポイントゲット！全問正解で50ポイントに挑戦しよう！`;
}

function restartQuiz() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
}
</script>
